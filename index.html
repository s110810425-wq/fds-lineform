<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frozen Dimensions Geomatics Center</title>
    <style>
        :root { --primary-color: #00c853; --dark-green: #2e7d32; --bg-color: #f0f2f5; }
        body { font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; background-color: var(--bg-color); margin: 0; padding: 0; }
        
        /* 頂部 Header 僅保留 Logo */
        .header { background: white; padding: 12px 30px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .logo { height: 40px; }

        /* 表單容器 */
        .container { max-width: 680px; margin: 30px auto; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 5px 25px rgba(0,0,0,0.07); }
        
        /* 標題移回表單上方 */
        .title-area { margin-bottom: 25px; border-left: 5px solid var(--primary-color); padding-left: 18px; }
        .main-title { font-size: 24px; font-weight: bold; color: #333; margin: 0; }
        .sub-title { font-size: 14px; color: #777; margin-top: 5px; letter-spacing: 1px; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #444; font-size: 16px; }
        select, input[type="text"], input[type="number"] { width: 100%; padding: 13px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: all 0.3s; background-color: white; }
        select:focus, input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 4px rgba(0, 200, 83, 0.1); }
        
        /* 地圖區域 */
        #map-container { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; margin-top: 10px; }
        #map { height: 380px; width: 100%; background-color: #e5e3df; } /* 增加預設底色 */
        .map-tools { position: absolute; top: 12px; right: 12px; z-index: 5; }
        .btn-toggle { background: white; border: 1px solid #ccc; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .btn-toggle.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        
        .location-display { background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee; font-family: monospace; color: #555; margin-top: 8px; }
        .tip-box { font-size: 13px; color: var(--dark-green); background: #e8f5e9; padding: 12px; border-radius: 8px; margin-top: 15px; display: flex; align-items: start; }

        .btn-submit { background-color: var(--primary-color); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-size: 19px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 4px 12px rgba(0, 200, 83, 0.2); }
        .btn-submit:hover { background-color: #00a844; transform: translateY(-1px); }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="header">
    <img src="./logo.png" alt="FDG Logo" class="logo" onerror="this.style.display='none'"> 
</div>

<div class="container">
    <div class="title-area">
        <h1 class="main-title">Frozen Dimensions Geomatics Center</h1>
        <div class="sub-title">專案需求評估單</div>
    </div>

    <form id="requestForm">
        <div class="form-group">
            <label for="serviceType">服務類別</label>
            <select id="serviceType">
                <option value="無人機航測">無人機航測</option>
                <option value="點雲資料處理">點雲資料處理</option>
                <option value="3DGS建模">3DGS建模</option>
                <option value="地形測量">地形測量</option>
            </select>
        </div>

        <div class="form-group">
            <label for="area">預估專案面積 (公頃)</label>
            <input type="number" id="area" step="0.01" placeholder="請輸入數字" required>
        </div>

        <div class="form-group">
            <label for="targetObject">標的物說明</label>
            <input type="text" id="targetObject" placeholder="例如：農地、廠房、歷史建物" required>
        </div>

        <div class="form-group">
            <label>專案位置定位</label>
            <div id="map-container">
                <div class="map-tools">
                    <button type="button" id="editToggle" class="btn-toggle active">編輯模式：開啟</button>
                </div>
                <div id="map"></div>
            </div>
            <input type="text" id="locationData" class="location-display" readonly placeholder="點擊地圖以獲取座標" required>
            <div class="tip-box">
                💡 提示：開啟編輯模式後，在地圖上點擊或拖曳標記以對準標的物。
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">送出需求評估</button>
    </form>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAIVHHU6_IYwLwDFonK9c6EPKeZoagW6Cg&callback=initMap"></script>

<script>
    let map, marker, isEditMode = true;
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzZDeNdatsrmwezdAGAE1WL8K5J02aEQ0COX2FoiUggU6QucZYrU6ww10V-DcRF1zoK/exec";

    function initMap() {
        const kinmen = { lat: 24.449, lng: 118.322 };
        try {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 15,
                center: kinmen,
                mapTypeId: 'hybrid',
                gestureHandling: 'cooperative'
            });

            marker = new google.maps.Marker({
                position: kinmen,
                map: map,
                draggable: true,
                animation: google.maps.Animation.DROP
            });

            map.addListener("click", (e) => {
                if (!isEditMode) return;
                marker.setPosition(e.latLng);
                updateCoords(e.latLng);
            });

            marker.addListener("dragend", () => {
                if (!isEditMode) return;
                updateCoords(marker.getPosition());
            });
        } catch (e) {
            console.error("地圖初始化失敗，請檢查 API 金鑰權限。", e);
        }
    }

    function updateCoords(latLng) {
        document.getElementById("locationData").value = latLng.lat().toFixed(6) + ", " + latLng.lng().toFixed(6);
    }

    document.getElementById("editToggle").addEventListener("click", function() {
        isEditMode = !isEditMode;
        this.classList.toggle("active");
        this.textContent = isEditMode ? "編輯模式：開啟" : "編輯模式：已鎖定";
        marker.setDraggable(isEditMode);
    });

    document.getElementById("requestForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true;
        btn.textContent = "傳送中...";

        const payload = {
            user: "Weizch先生", 
            serviceType: document.getElementById("serviceType").value,
            area: document.getElementById("area").value,
            targetObject: document.getElementById("targetObject").value,
            location: document.getElementById("locationData").value
        };

        fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
        .then(() => {
            alert("需求單已送出成功！");
            btn.disabled = false;
            btn.textContent = "送出需求評估";
        })
        .catch(() => {
            alert("傳送出錯，請檢查網路。");
            btn.disabled = false;
            btn.textContent = "送出需求評估";
        });
    });
</script>
</body>
</html>
