<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案需求評估 - Frozen Dimensions</title>
    <style>
        :root { --primary-color: #00c853; --dark-green: #2e7d32; }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        /* 頂部標題列與 Logo 整合 */
        .header { background: white; padding: 15px 25px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { height: 45px; margin-right: 15px; }
        .header-title { font-size: 20px; font-weight: bold; border-left: 4px solid var(--primary-color); padding-left: 15px; color: #333; }

        .container { max-width: 650px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .form-group { margin-bottom: 22px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #444; }
        select, input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(0, 200, 83, 0.1); }
        
        /* 地圖區域增強 */
        #map-container { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid #ddd; margin-bottom: 10px; }
        #map { height: 350px; width: 100%; }
        .map-tools { position: absolute; top: 10px; right: 10px; z-index: 5; }
        .btn-toggle { background: white; border: 1px solid #ddd; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-toggle.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        
        .location-display { background: #f8f9fa; padding: 10px; border-radius: 6px; border: 1px solid #eee; font-family: monospace; color: #666; font-size: 14px; }
        .tip { font-size: 13px; color: var(--dark-green); background: #e8f5e9; padding: 10px; border-radius: 6px; margin-top: 10px; }
        .btn-submit { background-color: var(--primary-color); color: white; border: none; padding: 16px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background-color: #00a844; }
    </style>
</head>
<body>

<div class="header">
    <img src="./logo.png" alt="Logo" class="logo" onerror="this.style.display='none'"> 
    <div class="header-title">專案需求評估單</div>
</div>

<div class="container">
    <form id="requestForm">
        <div class="form-group">
            <label>服務類別</label>
            <select id="serviceType">
                <option value="無人機航測">無人機航測</option>
                <option value="點雲資料處理">點雲資料處理</option>
                <option value="3DGS建模">3DGS建模</option>
                <option value="地形測量">地形測量</option>
            </select>
        </div>

        <div class="form-group">
            <label>預估專案面積 (公頃)</label>
            <input type="number" id="area" step="0.01" placeholder="請輸入數字" required>
        </div>

        <div class="form-group">
            <label>標的物說明</label>
            <input type="text" id="targetObject" placeholder="例如：農地、廠房、歷史建物" required>
        </div>

        <div class="form-group">
            <label>專案位置定位</label>
            <div id="map-container">
                <div class="map-tools">
                    <button type="button" id="editToggle" class="btn-toggle active">編輯模式：開啟</button>
                </div>
                <div id="map"></div>
            </div>
            <input type="text" id="locationData" class="location-display" readonly placeholder="點擊地圖以獲取座標" required>
            <div class="tip">💡 提示：開啟編輯模式後，在地圖上點擊或拖曳標記以對準標的物。</div>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">送出需求</button>
    </form>
</div>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>

<script>
    let map, marker, isEditMode = true;
    const GAS_URL = "YOUR_GAS_WEB_APP_URL";

    function initMap() {
        const kinmen = { lat: 24.449, lng: 118.322 };
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 15, center: kinmen, mapTypeId: 'hybrid',
            disableDefaultUI: false, zoomControl: true
        });

        marker = new google.maps.Marker({
            position: kinmen, map: map, draggable: true, title: "專案位置"
        });

        map.addListener("click", (e) => {
            if (!isEditMode) return;
            marker.setPosition(e.latLng);
            updateCoords(e.latLng);
        });

        marker.addListener("dragend", () => {
            if (!isEditMode) return;
            updateCoords(marker.getPosition());
        });
    }

    function updateCoords(latLng) {
        document.getElementById("locationData").value = latLng.lat().toFixed(6) + ", " + latLng.lng().toFixed(6);
    }

    // 切換編輯模式邏輯
    document.getElementById("editToggle").addEventListener("click", function() {
        isEditMode = !isEditMode;
        this.classList.toggle("active");
        this.textContent = isEditMode ? "編輯模式：開啟" : "編輯模式：已鎖定";
        marker.setDraggable(isEditMode);
    });

    document.getElementById("requestForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const btn = document.getElementById("submitBtn");
        btn.disabled = true; btn.textContent = "傳送中...";

        const payload = {
            user: "Weizch先生 (測試)", 
            serviceType: document.getElementById("serviceType").value,
            area: document.getElementById("area").value,
            targetObject: document.getElementById("targetObject").value,
            location: document.getElementById("locationData").value
        };

        fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
        .then(() => {
            alert("送出成功！");
            btn.disabled = false; btn.textContent = "送出需求";
        })
        .catch(() => {
            alert("傳送出錯，請檢查網路。");
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
